name: CI/CD - with Docker & EC2 

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/daedongyeojido

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build - PULL REQUEST
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image - PUSH
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Discord
        if: always()
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ job.status }}" == "success" ]; then
              TITLE="🚀 PR 빌드 성공"
              COLOR=3066993
            else
              TITLE="🚨 PR 빌드 실패"
              COLOR=15158332
            fi
          else
            if [ "${{ job.status }}" == "success" ]; then
              TITLE="✅ 배포 성공"
              COLOR=3066993
            else
              TITLE="❌ 배포 실패"
              COLOR=15158332
            fi
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson color $COLOR \
            '{
              "embeds": [{
                "title": $title,
                "color": $color,
                "fields": [
                  { "name": "Repository", "value": $repo },
                  { "name": "Branch", "value": $branch },
                  { "name": "Commit", "value": $commit },
                  { "name": "Triggered By", "value": $actor }
                ],
                "footer": { "text": "CI/CD Pipeline" },
                "url": $url
              }]
            }' | curl -H "Content-Type: application/json" \
              -d @- \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
