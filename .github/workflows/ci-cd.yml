name: CI/CD - with Docker & EC2

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/daedongyeojido

jobs:
  ci:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env from GitHub Secret
        run: |
          cat << 'EOF' > .env
          ${{ secrets.SECRETS_ENV }}
          EOF

      - name: Start Redis Container (CI)
        run: |
          docker network create ci-network || true

          docker run -d --name redis \
            --network ci-network \
            -p 6379:6379 \
            redis:7

      - name: Start MySQL Container (CI)
        run: |
          source .env

          docker run -d --name mysql \
            --network ci-network \
            -e MYSQL_ROOT_PASSWORD=$DB_PASSWORD \
            -e MYSQL_DATABASE=$DB_NAME \
            -e TZ=Asia/Seoul \
            mysql:8.0
            
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local-test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Container Health Check
        run: |
          echo "🚀 Running container for health check..."

          docker run -d --name app-test \
            --network ci-network \
            --env-file .env \
            -p 8080:8080 \
            local-test-image:latest

          echo "⏳ Waiting for Spring Boot..."

          for i in {1..30}; do
            if [ "$(docker inspect -f '{{.State.Running}}' app-test)" != "true" ]; then
              echo "❌ Container exited early"
              docker logs app-test
              docker rm -f app-test || true
              docker rm -f redis || true
              docker rm -f mysql || true
              exit 1
            fi

            if curl -f http://localhost:8080/actuator/health; then
              echo "✅ Health check passed!"
              docker rm -f app-test || true
              docker rm -f redis || true
              docker rm -f mysql || true
              exit 0
            fi

            echo "⏳ Not ready yet ($i/30)"
            sleep 2
          done

          echo "❌ Health check failed. Showing logs..."
          docker logs app-test
          docker rm -f app-test || true
          docker rm -f redis || true
          docker rm -f mysql || true
          exit 1

  docker_push:
    runs-on: ubuntu-22.04
    needs: ci
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image - PUSH
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-22.04
    needs: docker_push
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            docker compose pull
            docker compose up -d
            docker image prune -af
          EOF

  failure_analysis:
    runs-on: ubuntu-22.04
    needs: [ci, docker_push, deploy]
    if: ${{ always() && github.event_name == 'push' && (needs.ci.result == 'failure' || needs.docker_push.result == 'failure' || needs.deploy.result == 'failure') }}
    permissions:
      contents: read
      issues: write
    outputs:
      issue_url: ${{ steps.create_issue.outputs.issue_url }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect GitHub Actions failure logs
        run: |
          echo "=== GitHub Actions Failure Context ===" > failure.log
          echo "Job: ${{ github.job }}" >> failure.log
          echo "Run ID: ${{ github.run_id }}" >> failure.log
          echo "Workflow: ${{ github.workflow }}" >> failure.log
          echo "Branch: ${{ github.ref_name }}" >> failure.log
          echo "Commit: ${{ github.sha }}" >> failure.log
          echo "Actor: ${{ github.actor }}" >> failure.log
          echo "Event: ${{ github.event_name }}" >> failure.log
          echo "" >> failure.log
          echo "=== Failed Step Details ===" >> failure.log
          echo "Previous step status: ${{ job.status }}" >> failure.log
          echo "" >> failure.log
          echo "Full workflow log:" >> failure.log
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> failure.log
          echo "" >> failure.log

      - name: Summarize with Gemini and create GitHub Issue
        id: create_issue
        run: |
          node scripts/failure_summary.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CONTEXT: ${{ toJson(github) }}

  notify:
    runs-on: ubuntu-22.04
    needs: [ci, docker_push, deploy, failure_analysis]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Notify Discord
        env:
          CI_RESULT: ${{ needs.ci.result }}
          PUSH_RESULT: ${{ needs.docker_push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          ISSUE_URL: ${{ needs.failure_analysis.outputs.issue_url }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ "$CI_RESULT" = "failure" ] || [ "$PUSH_RESULT" = "failure" ] || [ "$DEPLOY_RESULT" = "failure" ]; then
            PIPELINE_STATUS="failure"
          else
            PIPELINE_STATUS="success"
          fi

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "$PIPELINE_STATUS" == "success" ]; then
              TITLE="🚀 PR 빌드 성공"
              COLOR=3066993
              DESC="Pull Request 빌드가 성공적으로 완료되었습니다."
            else
              TITLE="🚨 PR 빌드 실패"
              COLOR=15158332
              DESC="Pull Request 빌드에 실패했습니다."
            fi
          else
            if [ "$PIPELINE_STATUS" == "success" ]; then
              TITLE="✅ 배포 성공"
              COLOR=3066993
              DESC="프로덕션 배포가 성공적으로 완료되었습니다."
            else
              TITLE="❌ 배포 실패"
              COLOR=15158332
              if [ -n "$ISSUE_URL" ]; then
                DESC="🔗 배포 실패와 관련된 이슈가 자동으로 생성되었습니다!\n[$ISSUE_URL]($ISSUE_URL)"
              else
                DESC="배포 과정에서 오류가 발생했습니다."
              fi
            fi
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg repo "${{ github.repository }}" \
            --arg branch "$BRANCH_NAME" \
            --arg commit "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson color $COLOR \
            '{
              "embeds": [{
                "title": $title,
                "description": $desc,
                "color": $color,
                "fields": [
                  { "name": "Repository", "value": $repo, "inline": false },
                  { "name": "Branch", "value": $branch, "inline": false },
                  { "name": "Commit", "value": $commit, "inline": false },
                  { "name": "Triggered By", "value": $actor, "inline": false }
                ],
                "footer": { "text": "CI/CD Pipeline" },
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'",
                "url": $url
              }]
            }' | curl -H "Content-Type: application/json" \
              -d @- \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
